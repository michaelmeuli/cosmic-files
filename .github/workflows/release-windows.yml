name: Release Windows

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build Windows release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache NCBI sequences
        uses: actions/cache@v4
        with:
          path: res/sequences
          key: ncbi-sequences-v2

      - name: Install Rust stable
        run: rustup update stable && rustup default stable

      - name: Ensure windows_subsystem attribute
        shell: pwsh
        run: |
          $file = "src/main.rs"
          $attr = '#![windows_subsystem = "windows"]'
          $content = Get-Content $file -Raw
          if ($content -notmatch [regex]::Escape($attr)) {
            Set-Content $file -Value ($attr + "`n" + $content) -NoNewline
          }

      - name: Build release
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: cargo build --release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/cosmic-files.exe
