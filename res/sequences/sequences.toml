# NCBI E-utilities configuration
# Docs: https://www.ncbi.nlm.nih.gov/books/NBK25497/
email   = "michael.meuli@gmail.com"   # required by NCBI
# optional: raises rate limit to 10 req/s:
# [System.Environment]::SetEnvironmentVariable("NCBI_API_KEY", "your_key", "User")



# --- rrl (23S rRNA) --------------------------------------------------------

[[genome]]
accession = "CP000479.1"    # Mycobacterium avium 104 complete genome
locus_tag = "MAV_1533"      # rrlA (23S rRNA)
output    = "rrl/MAV_1533.fasta"

[[genome]]
accession = "CU458896"      # Mycobacteroides abscessus ATCC 19977 complete genome (ENA)
seq_start = 1464208
seq_stop  = 1467319
output    = "rrl/MAB_r5052.fasta"


# --- erm(41) ---

[[genome]]
accession = "NC_010397.1"       # Mycobacteroides abscessus ATCC 19977 complete genome
locus_tag = "MAB_2297"          # erm(41) CDS
output    = "erm41/erm41_abscessus_ATCC_19977.fasta"

[[genome]]
# Mycobacteroides abscessus subsp. bolletii CIP 108541 — WGS contig
# Coordinates taken from NCBI FASTA header: NZ_JRMF01000040.1:92072-92593
accession = "NZ_JRMF01000040.1"
locus_tag = "QP40_RS10855"          # erm(41) CDS
output    = "erm41/erm41_bolletii_CIP_108541.fasta"

# Mycobacteroides abscessus subsp. massiliense CCUG 48898 — WGS contig
# assembly: NZ_MVHY01000001.1
# erm41_massiliense_CCUG_48898.fasta was done manually. (deletion neart the end, but the end is still there)

# ---------------------------------------------------------------------------
# [[append]] — fetch a single accession and append it to a multi-FASTA file
#
# Required fields:
#   accession  NCBI nucleotide accession (version suffix optional)
#   fasta      filename inside res/sequences/ to append to
#
# Optional genome-extraction fields (mirrors [[genome]] above):
#   locus_tag  fetch feature table, locate gene, then fetch that region
#   seq_start  } already-known 1-based inclusive coordinates (skip feature
#   seq_stop   }   table lookup; strand defaults to forward)
#
# The sequence is only fetched if the accession is not already present in
# that file, so re-running the build is idempotent.
# ---------------------------------------------------------------------------

# Direct accession example:
# [[append]]
# accession = "AB123456.1"   # M. example strain — hsp65
# fasta     = "myco_hsp65.fasta"

# Genome / locus_tag example:
# [[append]]
# accession = "NZ_JRMF01000040.1"   # M. abscessus subsp. bolletii CIP 108541
# locus_tag = "QP40_RS10855"        # erm(41) CDS
# fasta     = "myco_erm41.fasta"

# Genome / explicit coordinates example:
# [[append]]
# accession = "NZ_JRMF01000040.1"
# seq_start = 92072
# seq_stop  = 92593
# fasta     = "myco_erm41.fasta"

