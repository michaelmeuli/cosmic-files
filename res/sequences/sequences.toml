# NCBI E-utilities configuration
# Docs: https://www.ncbi.nlm.nih.gov/books/NBK25497/
email   = "michael.meuli@gmail.com"   # required by NCBI
# recommended: raises rate limit from 3 to 10 req/s (without it, fetches are slower but still work):
# [System.Environment]::SetEnvironmentVariable("NCBI_API_KEY", "your_key", "User")


# --- erm(41) ---

[[genome]]
accession = "NC_010397.1"       # Mycobacteroides abscessus ATCC 19977 complete genome
seq_start = 2345955             # erm(41) CDS — locus_tag MAB_2297 (renamed in RefSeq reannotation)
seq_stop  = 2346476
output    = "erm41/erm41_abscessus_ATCC_19977.fasta"

[[genome]]
# Mycobacteroides abscessus subsp. bolletii CIP 108541 — WGS contig
accession = "NZ_JRMF01000040.1"
seq_start = 92072                   # erm(41) CDS — locus_tag QP40_RS10855
seq_stop  = 92593
output    = "erm41/erm41_bolletii_CIP_108541.fasta"

# Mycobacteroides abscessus subsp. massiliense CCUG 48898 — WGS contig
# assembly: NZ_MVHY01000001.1
# erm41_massiliense_CCUG_48898.fasta was done manually. (deletion neart the end, but the end is still there)


# --- pncA (pyrazinamide resistance) ---

[[genome]]
accession       = "NC_000962.3"      # Mycobacterium tuberculosis H37Rv complete genome
locus_tag       = "Rv2043c"          # pncA CDS — strand resolved automatically from the feature table
upstream_flank  = 50                 # covers WHO catalogue promoter SNPs down to c.-39
output          = "pnca/pnca_h37rv.fasta"

[[genome]]
accession       = "NC_002945.4"      # Mycobacterium bovis AF2122/97 complete genome
locus_tag       = "BQ2027_RS10545"   # pncA CDS
upstream_flank  = 50
output          = "pnca/pnca_bovis_AF2122_97.fasta"

[[genome]]
accession       = "NC_015848.1"      # Mycobacterium canettii CIPT 140010059 complete genome
locus_tag       = "MCAN_RS10790"     # pncA CDS
upstream_flank  = 50
output          = "pnca/pnca_canettii_CIPT_140010059.fasta"

# M. bovis BCG str. Pasteur 1173P2 (NC_008769.1, locus_tag BCG_RS10620) was tried but
# deliberately omitted: its pncA+upstream sequence is byte-identical to M. bovis AF2122/97
# above (BCG is a live-attenuated derivative of AF2122/97-like bovis strains, so pncA itself
# wasn't altered by attenuation), so it brought no new sequence diversity to the database.
#
# M. africanum GM041182 (NC_015758.1, locus_tag MAF_RS10650), M. mungi BM22813
# (NZ_LXTB01000081.1, locus_tag A7J32_RS15610), and M. orygis 51145 (CP063804.1,
# locus_tag RJtmp_002115) were tried but deliberately omitted for the same reason: their
# pncA+upstream sequences are byte-identical to each other (and distinct from H37Rv/bovis/
# canettii above), so adding all three brought no new sequence diversity to the database.



# Direct accession (no locus_tag / coordinates) — fetches the accession as-is:
