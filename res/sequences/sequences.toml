# --- rrs (16S rRNA) — per-subspecies M. abscessus ---
# abscessus: extracted from ntm-db genome (CU458896:1462398-1463901) — no fetch needed.

[[genome]]
# Mycobacteroides abscessus subsp. bolletii CIP 108541 — fill in rrs contig + locus_tag,
# then run `cargo build` to fetch rrs/rrs_bolletii_CIP_108541.fasta.
# accession = "<bolletii rrs contig>"
# locus_tag = "<rrs locus_tag>"
# output    = "rrs/rrs_bolletii_CIP_108541.fasta"
accession = "NZ_JRMF01000040.1"   # PLACEHOLDER — replace with rrs-containing contig
locus_tag = "TODO_rrs"             # PLACEHOLDER — replace with rrs locus tag
output    = "rrs/rrs_bolletii_CIP_108541.fasta"

[[genome]]
# Mycobacteroides abscessus subsp. massiliense CCUG 48898 — fill in rrs contig + locus_tag,
# then run `cargo build` to fetch rrs/rrs_massiliense_CCUG_48898.fasta.
# accession = "<massiliense rrs contig>"
# locus_tag = "<rrs locus_tag>"
# output    = "rrs/rrs_massiliense_CCUG_48898.fasta"
accession = "NZ_MVHY01000001.1"    # PLACEHOLDER — replace with rrs-containing contig
locus_tag = "TODO_rrs"             # PLACEHOLDER — replace with rrs locus tag
output    = "rrs/rrs_massiliense_CCUG_48898.fasta"


# --- erm(41) ---

[[genome]]
accession = "NC_010397.1"       # Mycobacteroides abscessus ATCC 19977 complete genome
locus_tag = "MAB_2297"          # erm(41) CDS
output    = "erm41/erm41_abscessus_ATCC_19977.fasta"

[[genome]]
# Mycobacteroides abscessus subsp. bolletii CIP 108541 — WGS contig
# Coordinates taken from NCBI FASTA header: NZ_JRMF01000040.1:92072-92593
accession = "NZ_JRMF01000040.1"
locus_tag = "QP40_RS10855"          # erm(41) CDS
output    = "erm41/erm41_bolletii_CIP_108541.fasta"

